AWSTemplateFormatVersion: '2010-09-09'
Description: >
  IAM User/Group lab deployed via CloudFormation Git Sync.
  Creates a one-time password in Secrets Manager, an S3 read-only group,
  an EC2 group, and three IAM console users (ec2-user1, ec2-user2, s3-user).
  ec2-user2 carries an explicit Deny on ec2:RunInstances despite EC2 Group
  membership. Each user's console login password is set directly via the
  native AWS::IAM::User LoginProfile property, resolved at deploy time from
  Secrets Manager using a CloudFormation dynamic reference. No custom
  resource, Lambda function, or IAM role is required.

Parameters:
  SecretName:
    Type: String
    Default: iam-lab/one-time-password
    Description: Name for the Secrets Manager secret holding the shared temporary password.

Resources:

  OneTimePasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Ref SecretName
      Description: Shared one-time console password for lab IAM users. Users must change it on first login.
      GenerateSecretString:
        PasswordLength: 16
        ExcludeCharacters: '"@/\''`'
        ExcludePunctuation: false
        RequireEachIncludedType: true

  S3ReadGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: S3-List-Group
      Policies:
        - PolicyName: S3-List-Buckets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ListS3Buckets
                Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                  - s3:GetBucketLocation
                Resource: '*'

  EC2Group:
    Type: AWS::IAM::Group
    Properties:
      GroupName: EC2-Manage-Group
      Policies:
        - PolicyName: EC2-List-And-Create
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: DescribeEC2
                Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeImages
                  - ec2:DescribeKeyPairs
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ec2:DescribeInstanceTypes
                  - ec2:DescribeAvailabilityZones
                Resource: '*'
              - Sid: CreateEC2
                Effect: Allow
                Action:
                  - ec2:RunInstances
                  - ec2:CreateTags
                Resource: '*'

  ############################################################
  # 3. IAM Users - password set natively via LoginProfile,
  #    pulled from Secrets Manager with a dynamic reference.
  ############################################################
  EC2User1:
    Type: AWS::IAM::User
    Properties:
      UserName: ec2-user1
      Groups:
        - !Ref EC2Group
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${OneTimePasswordSecret}}}'
        PasswordResetRequired: true
      Policies:
        # Required so the user can actually complete the forced password
        # reset on first login - PasswordResetRequired alone only prompts
        # for the change, it doesn't grant permission to perform it.
        - PolicyName: AllowSelfPasswordChange
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ChangeOwnPassword
                Effect: Allow
                Action:
                  - iam:ChangePassword
                  - iam:GetLoginProfile
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:user/${!aws:username}'

  EC2User2:
    Type: AWS::IAM::User
    Properties:
      UserName: ec2-user2
      Groups:
        - !Ref EC2Group
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${OneTimePasswordSecret}}}'
        PasswordResetRequired: true
      Policies:
        # Explicit deny overrides the RunInstances Allow inherited from EC2Group.
        - PolicyName: Deny-EC2-RunInstances
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: DenyCreateEC2Instances
                Effect: Deny
                Action:
                  - ec2:RunInstances
                Resource: '*'
        # Required so the user can actually complete the forced password
        # reset on first login - PasswordResetRequired alone only prompts
        # for the change, it doesn't grant permission to perform it.
        - PolicyName: AllowSelfPasswordChange
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ChangeOwnPassword
                Effect: Allow
                Action:
                  - iam:ChangePassword
                  - iam:GetLoginProfile
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:user/${!aws:username}'

  S3User:
    Type: AWS::IAM::User
    Properties:
      UserName: s3-user
      Groups:
        - !Ref S3ReadGroup
      LoginProfile:
        Password: !Sub '{{resolve:secretsmanager:${OneTimePasswordSecret}}}'
        PasswordResetRequired: true
      Policies:
        # Required so the user can actually complete the forced password
        # reset on first login - PasswordResetRequired alone only prompts
        # for the change, it doesn't grant permission to perform it.
        - PolicyName: AllowSelfPasswordChange
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ChangeOwnPassword
                Effect: Allow
                Action:
                  - iam:ChangePassword
                  - iam:GetLoginProfile
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:user/${!aws:username}'

Outputs:
  SecretArn:
    Description: ARN of the shared one-time password secret. Retrieve the value from Secrets Manager to log in.
    Value: !Ref OneTimePasswordSecret

  ConsoleSignInUrl:
    Description: Account-specific IAM console sign-in URL.
    Value: !Sub 'https://${AWS::AccountId}.signin.aws.amazon.com/console'

  EC2User1Name:
    Value: !Ref EC2User1
  EC2User2Name:
    Value: !Ref EC2User2
  S3UserName:
    Value: !Ref S3User
