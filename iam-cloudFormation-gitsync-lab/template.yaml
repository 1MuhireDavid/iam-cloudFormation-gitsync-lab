AWSTemplateFormatVersion: '2010-09-09'
Description: >
  IAM User/Group lab deployed via CloudFormation Git Sync.
  Creates a one-time password in Secrets Manager, an S3 read-only group,
  an EC2 group, and three IAM console users (ec2-user1, ec2-user2, s3-user).
  ec2-user2 carries an explicit Deny on ec2:RunInstances despite EC2 Group
  membership. A custom resource (Lambda-backed) sets each user's console
  login profile from the generated secret and forces a password reset on
  first login, since AWS::IAM::User has no native LoginProfile property.

Parameters:
  SecretName:
    Type: String
    Default: iam-lab/one-time-password
    Description: Name for the Secrets Manager secret holding the shared temporary password.

Resources:

  OneTimePasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Ref SecretName
      Description: Shared one-time console password for lab IAM users. Users must change it on first login.
      GenerateSecretString:
        PasswordLength: 16
        ExcludeCharacters: '"@/\''`'
        ExcludePunctuation: false
        RequireEachIncludedType: true

  S3ReadGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: S3-List-Group
      Policies:
        - PolicyName: S3-List-Buckets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ListS3Buckets
                Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                  - s3:GetBucketLocation
                Resource: '*'

  EC2Group:
    Type: AWS::IAM::Group
    Properties:
      GroupName: EC2-Manage-Group
      Policies:
        - PolicyName: EC2-List-And-Create
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: DescribeEC2
                Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeImages
                  - ec2:DescribeKeyPairs
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeSubnets
                  - ec2:DescribeVpcs
                  - ec2:DescribeInstanceTypes
                  - ec2:DescribeAvailabilityZones
                Resource: '*'
              - Sid: CreateEC2
                Effect: Allow
                Action:
                  - ec2:RunInstances
                  - ec2:CreateTags
                Resource: '*'

  EC2User1:
    Type: AWS::IAM::User
    Properties:
      UserName: ec2-user1
      Groups:
        - !Ref EC2Group

  EC2User2:
    Type: AWS::IAM::User
    Properties:
      UserName: ec2-user2
      Groups:
        - !Ref EC2Group
      Policies:
        # Explicit deny overrides the RunInstances Allow inherited from EC2Group.
        - PolicyName: Deny-EC2-RunInstances
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: DenyCreateEC2Instances
                Effect: Deny
                Action:
                  - ec2:RunInstances
                Resource: '*'

  S3User:
    Type: AWS::IAM::User
    Properties:
      UserName: s3-user
      Groups:
        - !Ref S3ReadGroup

  ############################################################
  # 4. Custom resource support: set console login profile
  #    (AWS::IAM::User has no LoginProfile property in CFN)
  ############################################################
  LoginProfileFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LoginProfileManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateLoginProfile
                  - iam:UpdateLoginProfile
                  - iam:DeleteLoginProfile
                  - iam:GetLoginProfile
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:user/*'
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref OneTimePasswordSecret
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  LoginProfileFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: iam-lab-set-login-profile
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt LoginProfileFunctionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse

          def handler(event, context):
              props = event.get('ResourceProperties', {})
              username = props.get('UserName')
              secret_arn = props.get('SecretArn')
              physical_id = event.get('PhysicalResourceId') or f"login-profile-{username}"
              try:
                  iam = boto3.client('iam')
                  if event['RequestType'] in ('Create', 'Update'):
                      sm = boto3.client('secretsmanager')
                      password = sm.get_secret_value(SecretId=secret_arn)['SecretString']
                      try:
                          iam.create_login_profile(
                              UserName=username,
                              Password=password,
                              PasswordResetRequired=True
                          )
                      except iam.exceptions.EntityAlreadyExistsException:
                          iam.update_login_profile(
                              UserName=username,
                              Password=password,
                              PasswordResetRequired=True
                          )
                  elif event['RequestType'] == 'Delete':
                      try:
                          iam.delete_login_profile(UserName=username)
                      except iam.exceptions.NoSuchEntityException:
                          pass
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, physical_id)
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)}, physical_id)

  EC2User1LoginProfile:
    Type: Custom::LoginProfile
    DependsOn: EC2User1
    Properties:
      ServiceToken: !GetAtt LoginProfileFunction.Arn
      UserName: !Ref EC2User1
      SecretArn: !Ref OneTimePasswordSecret

  EC2User2LoginProfile:
    Type: Custom::LoginProfile
    DependsOn: EC2User2
    Properties:
      ServiceToken: !GetAtt LoginProfileFunction.Arn
      UserName: !Ref EC2User2
      SecretArn: !Ref OneTimePasswordSecret

  S3UserLoginProfile:
    Type: Custom::LoginProfile
    DependsOn: S3User
    Properties:
      ServiceToken: !GetAtt LoginProfileFunction.Arn
      UserName: !Ref S3User
      SecretArn: !Ref OneTimePasswordSecret

Outputs:
  SecretArn:
    Description: ARN of the shared one-time password secret. Retrieve the value from Secrets Manager to log in.
    Value: !Ref OneTimePasswordSecret

  ConsoleSignInUrl:
    Description: Account-specific IAM console sign-in URL.
    Value: !Sub 'https://${AWS::AccountId}.signin.aws.amazon.com/console'

  EC2User1Name:
    Value: !Ref EC2User1
  EC2User2Name:
    Value: !Ref EC2User2
  S3UserName:
    Value: !Ref S3User
